<?xml version="1.0" encoding="UTF-8"?>
<!--
  Press still — A4 portrait, dark variant. Same layout as
  press-still-a4.svg, palette swapped to the bulletin's dark scheme:
  near-black ground (#0a0908), cream ink, gold accent (#d4a869) — the
  exact palette of the printed liturgical bulletin in print/bulletin.html.

  Print note: dark backgrounds use a lot of toner / ink. The light A4
  variant is the better default for hand-distributed press kits; this
  dark variant fits screens, projector slides, and digital press
  attachments where the dark register reads better.

  All sizes in mm (including font-size as unitless viewBox units, since
  the viewBox is in mm). See press-still-a4.svg's header comment for
  why pt is the wrong unit here.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="210mm"
  height="297mm"
  viewBox="0 0 210 297"
  font-family="Georgia, 'Times New Roman', serif"
>
  <rect width="210" height="297" fill="#0a0908" />

  <g fill="#e8e4d9">
    <text x="18" y="50" font-size="11" font-weight="600" letter-spacing="-0.3">GOD BLESS</text>
    <text x="18" y="64" font-size="11" font-weight="600" letter-spacing="-0.3">THE UNITED STATES</text>
    <text x="18" y="78" font-size="11" font-weight="600" letter-spacing="-0.3">OF ALIENS</text>
  </g>

  <text x="18" y="88" font-size="3.4" font-style="italic" fill="#8a8478">
    An All-Seeing Eyewitness Report
  </text>

  <line x1="18" y1="100" x2="50" y2="100" stroke="#d4a869" stroke-width="0.4" />

  <g fill="#e8e4d9" font-size="3.2">
    <text x="18" y="112">
      A guest work in <tspan font-style="italic">Domus Diasporica</tspan>
    </text>
    <text x="18" y="120">
      Pavilion of Bosnia and Herzegovina
    </text>
    <text x="18" y="128">
      Exhibitor: Mladen Bundalo
    </text>
    <text x="18" y="136">
      Commissioner: Sarita Vujković · Curator: Isidora Živković
    </text>
    <text x="18" y="150">
      Palazzo Malipiero · San Marco 3198 · 30124 Venice
    </text>
    <text x="18" y="158">
      61st International Art Exhibition — La Biennale di Venezia
    </text>
    <text x="18" y="166">
      <tspan font-style="italic">In Minor Keys</tspan> — curated by Koyo Kouoh
    </text>
    <text x="18" y="180" font-size="4.2" font-weight="600" fill="#d4a869">
      Vernissage Friday May 8, 2026 · 19:00
    </text>
    <text x="18" y="188" font-size="3.4">
      On view May 9 – November 22, 2026
    </text>
  </g>

  <!-- QR + URL block. The QR svg is inlined (not referenced via
       <image href="...">) because browsers loading the outer SVG via
       <img src=…> block external resource references and the QR would
       silently fail to load. The QR's own cream background keeps it
       scannable against the dark ground here, so no separate cream
       tile is needed. If the QR ever changes regenerate it via
       `npm run generate:qr` and replace the path data block below. -->
  <g transform="translate(18, 200)">
    <svg x="0" y="0" width="40" height="40" viewBox="0 0 33 33" shape-rendering="crispEdges">
      <path fill="#f9f6ef" d="M0 0h33v33H0z"/>
      <path stroke="#0a0908" d="M2 2.5h7m6 0h3m2 0h3m1 0h7M2 3.5h1m5 0h1m2 0h3m1 0h4m3 0h1m1 0h1m5 0h1M2 4.5h1m1 0h3m1 0h1m1 0h2m3 0h1m1 0h1m2 0h3m1 0h1m1 0h3m1 0h1M2 5.5h1m1 0h3m1 0h1m1 0h2m1 0h1m2 0h2m1 0h3m2 0h1m1 0h3m1 0h1M2 6.5h1m1 0h3m1 0h1m1 0h2m5 0h6m1 0h1m1 0h3m1 0h1M2 7.5h1m5 0h1m1 0h2m1 0h1m8 0h1m1 0h1m5 0h1M2 8.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M10 9.5h4m2 0h1m1 0h1m2 0h2M2 10.5h1m1 0h5m2 0h1m2 0h1m4 0h1m4 0h5M4 11.5h1m1 0h1m2 0h1m3 0h1m1 0h3m2 0h3m1 0h3m3 0h1M2 12.5h4m2 0h1m2 0h1m1 0h8m1 0h2m2 0h1M2 13.5h1m1 0h1m8 0h3m2 0h1m1 0h5m2 0h1m1 0h1M4 14.5h2m2 0h7m1 0h1m2 0h1m1 0h1m5 0h2M2 15.5h1m1 0h1m1 0h1m4 0h1m7 0h3m1 0h4m3 0h1M3 16.5h3m1 0h2m1 0h1m1 0h2m3 0h2m3 0h7M4 17.5h4m1 0h2m1 0h2m2 0h2m2 0h1m1 0h1m3 0h1m2 0h1M4 18.5h5m3 0h3m2 0h1m1 0h1m1 0h1m3 0h1m1 0h2M2 19.5h1m2 0h1m3 0h1m1 0h1m2 0h3m1 0h1m1 0h3m1 0h3m1 0h1m1 0h1M2 20.5h1m1 0h3m1 0h1m1 0h1m1 0h7m3 0h2m1 0h2m1 0h1M2 21.5h1m2 0h3m2 0h3m2 0h1m5 0h2m1 0h1m1 0h1m2 0h1M2 22.5h1m2 0h1m2 0h7m1 0h4m1 0h6m1 0h3M10 23.5h1m2 0h1m4 0h1m3 0h1m3 0h5M2 24.5h7m2 0h1m5 0h6m1 0h1m1 0h3M2 25.5h1m5 0h1m1 0h1m3 0h1m1 0h3m2 0h2m3 0h1m2 0h2M2 26.5h1m1 0h3m1 0h1m1 0h4m3 0h3m2 0h5m1 0h2M2 27.5h1m1 0h3m1 0h1m1 0h2m1 0h1m1 0h2m1 0h1m2 0h3m3 0h4M2 28.5h1m1 0h3m1 0h1m1 0h1m4 0h6m2 0h7M2 29.5h1m5 0h1m2 0h1m5 0h2m3 0h1m1 0h1m1 0h2m1 0h1M2 30.5h7m1 0h2m1 0h2m1 0h1m2 0h3m1 0h4m1 0h1"/>
    </svg>
    <g font-size="3.2">
      <text x="48" y="14" fill="#e8e4d9">Scan to listen</text>
      <text x="48" y="22" font-weight="600" fill="#d4a869">
        daqhris.com/god-bless-usa/
      </text>
      <text x="48" y="32" fill="#8a8478" font-style="italic">
        ~18-minute AI-voiced ceremony, headphones recommended.
      </text>
    </g>
  </g>

  <line x1="18" y1="262" x2="192" y2="262" stroke="#4a4744" stroke-width="0.2" />
  <g fill="#8a8478" font-size="2.6">
    <text x="18" y="270">
      Co-directed by Chris-Armel Iradukunda (daqhris) and Claude Opus 4.7. Voices by Kokoro-82M (Apache-2.0).
    </text>
    <text x="18" y="276">
      Made at Hectolitre, Brussels. Built during the Built with Opus 4.7 hackathon (Cerebral Valley × Anthropic, April 2026).
    </text>
    <text x="18" y="282">
      Code: EUPL-1.2 · Performance &amp; text: CC BY-NC-ND 4.0 · github.com/daqhris/god-bless-usa
    </text>
  </g>
</svg>
