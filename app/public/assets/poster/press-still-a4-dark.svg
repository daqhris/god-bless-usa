<?xml version="1.0" encoding="UTF-8"?>
<!--
  Press still — A4 portrait, dark variant. Same layout as
  press-still-a4.svg, palette swapped to the dark scheme from style.css.

  Print note: dark backgrounds use a lot of toner / ink. The light A4
  variant is the better default for hand-distributed press kits; this
  dark variant fits screens, projector slides, and digital press
  attachments where the dark register reads better.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="210mm"
  height="297mm"
  viewBox="0 0 210 297"
  font-family="Georgia, 'Times New Roman', serif"
>
  <rect width="210" height="297" fill="#181816" />

  <g fill="#e8e4d9">
    <text x="18" y="62" font-size="20pt" font-weight="600" letter-spacing="-0.3">GOD BLESS</text>
    <text x="18" y="84" font-size="20pt" font-weight="600" letter-spacing="-0.3">THE UNITED STATES</text>
    <text x="18" y="106" font-size="20pt" font-weight="600" letter-spacing="-0.3">OF ALIENS</text>
  </g>

  <text x="18" y="118" font-size="9pt" font-style="italic" fill="#9a948a">
    An All-Seeing Eyewitness Report
  </text>

  <line x1="18" y1="132" x2="50" y2="132" stroke="#d47575" stroke-width="0.4" />

  <g fill="#e8e4d9">
    <text x="18" y="146" font-size="9pt">
      A guest work in <tspan font-style="italic">Domus Diasporica</tspan>
    </text>
    <text x="18" y="156" font-size="9pt">
      Pavilion of Bosnia and Herzegovina
    </text>
    <text x="18" y="166" font-size="9pt">
      Exhibitor: Mladen Bundalo · Commissioner: Sarita Vujković · Curator: Isidora Živković
    </text>
    <text x="18" y="180" font-size="9pt">
      Palazzo Malipiero · San Marco 3198 · 30124 Venice
    </text>
    <text x="18" y="190" font-size="9pt">
      61st International Art Exhibition — La Biennale di Venezia
    </text>
    <text x="18" y="200" font-size="9pt">
      <tspan font-style="italic">In Minor Keys</tspan> — curated by Koyo Kouoh
    </text>
    <text x="18" y="216" font-size="11pt" font-weight="600" fill="#d47575">
      May 9 – November 22, 2026
    </text>
  </g>

  <!-- QR + URL block. The QR svg is rendered as black-on-transparent;
       on a dark background it would vanish, so wrap it in a small
       cream tile to keep it scannable. -->
  <g transform="translate(120, 196)">
    <rect x="-2" y="-2" width="38" height="38" fill="#f9f6ef" />
    <image
      href="../qr/god-bless-usa.svg"
      width="34"
      height="34"
    />
    <text x="40" y="14" font-size="9pt" fill="#e8e4d9">
      Scan to listen
    </text>
    <text x="40" y="24" font-size="9pt" fill="#d47575" font-weight="600">
      daqhris.com/
    </text>
    <text x="40" y="32" font-size="9pt" fill="#d47575" font-weight="600">
      god-bless-usa/
    </text>
  </g>

  <line x1="18" y1="252" x2="192" y2="252" stroke="#4a4744" stroke-width="0.2" />
  <g fill="#9a948a" font-size="7pt">
    <text x="18" y="262">
      An AI-voiced ceremony of approximately eighteen minutes. Listen on headphones.
    </text>
    <text x="18" y="271">
      Co-directed by Chris-Armel Iradukunda (daqhris) and Claude Opus 4.7. Voices by Kokoro-82M (Apache-2.0).
    </text>
    <text x="18" y="280">
      Made at Hectolitre, Brussels. Built during the Built with Opus 4.7 hackathon (Cerebral Valley × Anthropic, April 2026).
    </text>
    <text x="18" y="289">
      Code: EUPL-1.2 · Performance &amp; text: CC BY-NC-ND 4.0 · github.com/daqhris/god-bless-usa
    </text>
  </g>
</svg>
