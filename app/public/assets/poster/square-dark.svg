<?xml version="1.0" encoding="UTF-8"?>
<!--
  Square — dark variant. Same layout as square.svg, palette swapped to
  the dark scheme from style.css.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1080 1080"
  width="1080"
  height="1080"
  font-family="Georgia, 'Times New Roman', serif"
>
  <rect width="1080" height="1080" fill="#0a0908" />

  <g fill="#e8e4d9">
    <text x="80" y="240" font-size="106" font-weight="600" letter-spacing="-1">GOD</text>
    <text x="80" y="354" font-size="106" font-weight="600" letter-spacing="-1">BLESS THE</text>
    <text x="80" y="468" font-size="106" font-weight="600" letter-spacing="-1">UNITED STATES</text>
    <text x="80" y="582" font-size="106" font-weight="600" letter-spacing="-1">OF ALIENS</text>
  </g>

  <text x="80" y="638" font-size="26" font-style="italic" fill="#8a8478">
    An All-Seeing Eyewitness Report
  </text>

  <line x1="80" y1="700" x2="220" y2="700" stroke="#d4a869" stroke-width="2" />

  <g fill="#e8e4d9">
    <text x="80" y="754" font-size="22">
      A guest work in <tspan font-style="italic">Domus Diasporica</tspan>
    </text>
    <text x="80" y="788" font-size="22">
      Pavilion of Bosnia and Herzegovina
    </text>
    <text x="80" y="822" font-size="22">
      Palazzo Malipiero · 61st Venice Biennale
    </text>
    <text x="80" y="856" font-size="22">
      <tspan font-style="italic">In Minor Keys</tspan> — Koyo Kouoh
    </text>
    <text x="80" y="900" font-size="26" font-weight="600">
      <tspan fill="#d4a869">Vernissage Friday May 8, 19:00</tspan>
    </text>
    <text x="80" y="928" font-size="20">
      On view May 9 – November 22, 2026
    </text>
  </g>

  <text x="80" y="970" font-size="28" font-weight="600" fill="#d4a869">
    daqhris.com/god-bless-usa/
  </text>
  <text x="80" y="1000" font-size="16" fill="#8a8478">
    An AI-voiced ceremony, ~18 minutes, headphones recommended.
  </text>
  <text x="80" y="1028" font-size="14" font-style="italic" fill="#8a8478">
    Co-directed by Chris-Armel Iradukunda (daqhris) and Claude Opus 4.7
  </text>
</svg>
