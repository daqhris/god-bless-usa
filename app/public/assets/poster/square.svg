<?xml version="1.0" encoding="UTF-8"?>
<!--
  Square — 1080×1080. Instagram feed posts, Facebook square, generic
  social. Same typographic system as og-press.svg; the title is split
  across four lines so the square format isn't crowded.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1080 1080"
  width="1080"
  height="1080"
  font-family="Georgia, 'Times New Roman', serif"
>
  <rect width="1080" height="1080" fill="#f9f6ef" />

  <!-- Title block: four lines, taller stack for the square. -->
  <g fill="#1a1a1a">
    <text x="80" y="240" font-size="106" font-weight="600" letter-spacing="-1">GOD</text>
    <text x="80" y="354" font-size="106" font-weight="600" letter-spacing="-1">BLESS THE</text>
    <text x="80" y="468" font-size="106" font-weight="600" letter-spacing="-1">UNITED STATES</text>
    <text x="80" y="582" font-size="106" font-weight="600" letter-spacing="-1">OF ALIENS</text>
  </g>

  <text x="80" y="638" font-size="26" font-style="italic" fill="#5a5a5a">
    An All-Seeing Eyewitness Report
  </text>

  <line x1="80" y1="700" x2="220" y2="700" stroke="#8a2c2c" stroke-width="2" />

  <g fill="#1a1a1a">
    <text x="80" y="754" font-size="22">
      A guest work in <tspan font-style="italic">Domus Diasporica</tspan>
    </text>
    <text x="80" y="788" font-size="22">
      Pavilion of Bosnia and Herzegovina
    </text>
    <text x="80" y="822" font-size="22">
      Palazzo Malipiero · 61st Venice Biennale
    </text>
    <text x="80" y="856" font-size="22">
      <tspan font-style="italic">In Minor Keys</tspan> — Koyo Kouoh
    </text>
    <text x="80" y="908" font-size="26" font-weight="600">
      <tspan fill="#8a2c2c">May 9 – November 22, 2026</tspan>
    </text>
  </g>

  <text x="80" y="970" font-size="28" font-weight="600" fill="#8a2c2c">
    daqhris.com/god-bless-usa/
  </text>
  <text x="80" y="1000" font-size="16" fill="#5a5a5a">
    An AI-voiced ceremony, ~18 minutes, headphones recommended.
  </text>
  <text x="80" y="1028" font-size="14" font-style="italic" fill="#5a5a5a">
    Co-directed by Chris-Armel Iradukunda (daqhris) and Claude Opus 4.7
  </text>
</svg>
