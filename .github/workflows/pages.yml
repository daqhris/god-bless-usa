name: Deploy to GitHub Pages

# Triggered on every push to main, plus manually via the Actions tab
# (workflow_dispatch — useful fallback if a push-event trigger ever
# misfires, which can happen on merge commits with newly-created files).
# The artifact is the static contents of app/public/ — no build step
# required, since the visitor player is plain HTML / CSS / JS and the
# audio is pre-rendered into the same folder.

on:
  push:
    branches: [main]
    paths:
      - "app/public/**"
      - "story.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Required permissions for the official deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment may run at a time. Don't cancel an in-flight
# deploy when a new push arrives — let it finish so the live site never
# falls into a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Stage the pre-existing root-level story.html into the deploy artifact
      # so /god-bless-usa/story resolves to the original written-text version
      # of the work — kept in sync with the audio piece served at /. The
      # source file at the repo root is left bit-perfect (per SUBMISSION.md's
      # rule that root files are pre-existing source material). Only the
      # canonical / OG / Twitter URLs are rewritten on the deployed copy so
      # they point at /story rather than at the audio root.
      - name: Stage /story page from root story.html
        run: |
          mkdir -p app/public/story
          sed \
            -e 's|<link rel="canonical" href="https://daqhris.com/god-bless-usa">|<link rel="canonical" href="https://daqhris.com/god-bless-usa/story">|' \
            -e 's|<meta property="og:url" content="https://daqhris.com/god-bless-usa">|<meta property="og:url" content="https://daqhris.com/god-bless-usa/story">|' \
            -e 's|<meta property="twitter:url" content="https://daqhris.com/god-bless-usa">|<meta property="twitter:url" content="https://daqhris.com/god-bless-usa/story">|' \
            story.html > app/public/story/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
